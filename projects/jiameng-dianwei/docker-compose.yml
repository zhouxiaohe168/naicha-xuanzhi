version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: naicha_xuanzhi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./server
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/naicha_xuanzhi
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server:/app   # 开发时热重载

volumes:
  postgres_data:
